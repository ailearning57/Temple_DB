{% extends 'base.html' %}
{% block title %}Login | Temple{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-lg border border-orange-100 p-8 mt-10">
    <div class="text-center mb-6">
        <div class="inline-block bg-orange-100 p-3 rounded-full mb-2">
            <svg class="w-8 h-8 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900">Secure Login</h2>
        <p class="text-sm text-gray-500 mt-2">Access your account and financial records.</p>
    </div>
    
    {% if form.errors %}
    <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-4" role="alert">
        <p class="font-bold">Error</p>
        <p>Your username and password didn't match.</p>
    </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="mb-5">
            <label for="id_username" class="block text-gray-700 text-sm font-semibold mb-2">Username</label>
            <input type="text" name="username" id="id_username" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-orange-200 transition duration-200" required>
        </div>
        <div class="mb-6">
            <label for="id_password" class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
            <input type="password" name="password" id="id_password" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-orange-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-orange-200 transition duration-200" required>
        </div>
        <div>
            <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-200 transform hover:-translate-y-0.5">
                Log In
            </button>
        </div>
    </form>
</div>
{% endblock %}
